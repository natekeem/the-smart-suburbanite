    <text x="270" y="48" text-anchor="middle" font-size="25" fill="#5a6d65">comfort, compatibility, and daily use</text>

    <g transform="translate(0 100)">
      <rect width="162" height="256" rx="26" fill="#e4f0e9" stroke="#42695d" stroke-width="7" />
      <text x="81" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#28443b">Buy</text>
      <path d="M48 112l24 24 48-58" fill="none" stroke="#42695d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M44 176h74M44 210h52" stroke="#7c978e" stroke-width="8" stroke-linecap="round" />
    </g>

    <g transform="translate(190 100)">
      <rect width="162" height="256" rx="26" fill="#f5efd9" stroke="#856f3a" stroke-width="7" />
      <text x="81" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#28443b">Wait</text>
      <circle cx="81" cy="110" r="43" fill="none" stroke="#856f3a" stroke-width="10" />
      <path d="M81 82v31l24 18" fill="none" stroke="#856f3a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M44 176h74M44 210h52" stroke="#a59055" stroke-width="8" stroke-linecap="round" />
    </g>

    <g transform="translate(380 100)">
      <rect width="162" height="256" rx="26" fill="#efe8e4" stroke="#8a5f4f" stroke-width="7" />
      <text x="81" y="58" text-anchor="middle" font-size="34" font-weight="800" fill="#28443b">Skip</text>
      <path d="M52 82l58 58M110 82l-58 58" stroke="#8a5f4f" stroke-width="11" stroke-linecap="round" />
      <path d="M44 176h74M44 210h52" stroke="#a47d70" stroke-width="8" stroke-linecap="round" />
    </g>

    <g transform="translate(52 426)" fill="none" stroke="#28443b" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0h436" stroke-width="9" opacity=".18" />
      <path d="M16 66h96M156 66h96M296 66h96" stroke-width="10" opacity=".38" />
      <path d="M20 104l13 13 24-29M160 104l13 13 24-29M300 104l13 13 24-29" stroke="#6f9185" stroke-width="8" />
