    <rect x="228" y="-24" width="220" height="62" rx="20" fill="#6f9185" stroke="#28443b" stroke-width="8" />
    <rect x="282" y="-48" width="112" height="42" rx="20" fill="#f5f2ea" stroke="#28443b" stroke-width="7" />
  </g>

  <g transform="translate(530 216)" font-family="Inter, Arial, sans-serif">
