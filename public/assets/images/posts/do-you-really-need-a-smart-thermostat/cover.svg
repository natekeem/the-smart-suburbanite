<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Smart thermostat decision board for homeowners</title>
  <desc id="desc">A practical smart thermostat decision board for homeowners with buy, wait, and skip options.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f2ea" />
      <stop offset="1" stop-color="#e4eef0" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf6" />
      <stop offset="1" stop-color="#f0eadf" />
    </linearGradient>
    <filter id="softShadow" x="-120" y="-120" width="1840" height="1140" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#2f403b" flood-opacity=".18" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="96" y="96" width="1408" height="708" rx="34" fill="#ffffff" opacity=".72" />

  <g opacity=".34">
    <circle cx="226" cy="190" r="72" fill="#cfe0d7" />
    <circle cx="1378" cy="704" r="98" fill="#eadfcb" />
    <circle cx="1248" cy="190" r="54" fill="#d7e1ea" />
  </g>

  <g transform="translate(150 262)" fill="none" stroke="#28443b" stroke-linecap="round" stroke-linejoin="round">
    <path d="M96 176 260 52l164 124" stroke-width="12" />
