<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Smart thermostat compatibility pre-check cover</title>
  <desc id="desc">A calm homeowner guide illustration with a house outline, generic thermostat shape, and compatibility checklist board.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf8"/>
      <stop offset="0.55" stop-color="#e8f1ed"/>
      <stop offset="1" stop-color="#dbe8e6"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf5f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#16342f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="476" width="1200" height="154" fill="#d3e2de"/>
  <path d="M0 478 C170 432 303 453 452 487 C621 525 792 520 963 476 C1057 452 1138 449 1200 464 L1200 630 L0 630 Z" fill="#c3d7d1" opacity="0.7"/>

  <g transform="translate(88 104)" opacity="0.96">
