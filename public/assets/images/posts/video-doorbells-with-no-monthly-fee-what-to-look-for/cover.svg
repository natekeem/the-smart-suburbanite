<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Video doorbell buyer checklist cover</title>
  <desc id="desc">A calm homeowner guide illustration with a front door outline, abstract video doorbell icon, and buyer checklist cards for fees, storage, Wi-Fi, privacy, and app features.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="0.48" stop-color="#eef4f0"/>
      <stop offset="1" stop-color="#dbe8ed"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4eadc"/>
      <stop offset="1" stop-color="#d5c0a5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5f2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f3f42" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="488" width="1200" height="142" fill="#cbdeda"/>
  <path d="M0 492 C140 456 273 459 423 494 C579 531 736 526 913 486 C1030 460 1122 459 1200 474 L1200 630 L0 630 Z" fill="#b8d0cc" opacity="0.66"/>

  <g transform="translate(82 82)">
    <path d="M56 184 L246 42 L437 184" fill="none" stroke="#2f504f" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M102 182 V430 H392 V182" fill="#f9fcfa" stroke="#2f504f" stroke-width="12" stroke-linejoin="round"/>
    <rect x="172" y="213" width="151" height="217" rx="8" fill="url(#door)" stroke="#2f504f" stroke-width="8"/>
    <rect x="127" y="222" width="72" height="70" rx="5" fill="#e8f0ed" stroke="#2f504f" stroke-width="7"/>
    <rect x="296" y="222" width="72" height="70" rx="5" fill="#e8f0ed" stroke="#2f504f" stroke-width="7"/>
    <circle cx="301" cy="324" r="9" fill="#2f504f"/>
    <path d="M88 432 H410" stroke="#2f504f" stroke-width="13" stroke-linecap="round"/>
  </g>

  <g transform="translate(407 252)" filter="url(#softShadow)">
    <rect x="0" y="0" width="126" height="186" rx="32" fill="#fcfefe" stroke="#2f504f" stroke-width="8"/>
    <rect x="31" y="31" width="64" height="64" rx="18" fill="#d8e9ef" stroke="#5c8190" stroke-width="5"/>
    <circle cx="63" cy="132" r="19" fill="#2f504f"/>
    <path d="M49 132 H77" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="570" y="78" width="516" height="474" rx="28" fill="url(#panel)" stroke="#a2b9b5" stroke-width="3"/>
    <rect x="570" y="78" width="516" height="84" rx="28" fill="#315e5d"/>
    <path d="M570 134 H1086" stroke="#315e5d" stroke-width="56"/>
    <text x="620" y="132" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">Buyer Checklist</text>
  </g>

  <g transform="translate(620 202)" font-family="Arial, Helvetica, sans-serif">
    <g>
      <rect x="0" y="0" width="398" height="54" rx="18" fill="#e7f2ed"/>
      <circle cx="31" cy="27" r="17" fill="#f8fcfa" stroke="#2f6a56" stroke-width="4"/>
      <path d="M22 27 L29 34 L42 20" fill="none" stroke="#2f6a56" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="36" fill="#24433d" font-size="28" font-weight="700">Check Fees</text>
    </g>
    <g transform="translate(0 70)">
      <rect x="0" y="0" width="398" height="54" rx="18" fill="#eef0fb"/>
      <circle cx="31" cy="27" r="17" fill="#fbfcff" stroke="#4f5f98" stroke-width="4"/>
      <path d="M22 27 L29 34 L42 20" fill="none" stroke="#4f5f98" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="36" fill="#323f6d" font-size="28" font-weight="700">Storage</text>
    </g>
    <g transform="translate(0 140)">
      <rect x="0" y="0" width="398" height="54" rx="18" fill="#fff3d8"/>
      <circle cx="31" cy="27" r="17" fill="#fffdf7" stroke="#98723a" stroke-width="4"/>
      <path d="M22 27 L29 34 L42 20" fill="none" stroke="#98723a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="36" fill="#554227" font-size="28" font-weight="700">Wi-Fi</text>
    </g>
    <g transform="translate(0 210)">
      <rect x="0" y="0" width="398" height="54" rx="18" fill="#f2e9f3"/>
      <circle cx="31" cy="27" r="17" fill="#fffaff" stroke="#76547d" stroke-width="4"/>
      <path d="M22 27 L29 34 L42 20" fill="none" stroke="#76547d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="36" fill="#4d3654" font-size="28" font-weight="700">Privacy</text>
    </g>
    <g transform="translate(0 280)">
      <rect x="0" y="0" width="398" height="54" rx="18" fill="#e9f3f6"/>
      <circle cx="31" cy="27" r="17" fill="#fbfeff" stroke="#4d7380" stroke-width="4"/>
      <path d="M22 27 L29 34 L42 20" fill="none" stroke="#4d7380" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="36" fill="#344d56" font-size="28" font-weight="700">App</text>
    </g>
  </g>

  <g opacity="0.52">
    <circle cx="146" cy="101" r="8" fill="#315e5d"/>
    <circle cx="1092" cy="184" r="10" fill="#98723a"/>
    <circle cx="1080" cy="524" r="8" fill="#4f5f98"/>
    <circle cx="92" cy="531" r="11" fill="#76547d"/>
